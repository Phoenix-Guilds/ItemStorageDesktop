<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>ItemStorage Console</title>

    <style>
      html,
      body {
        background: #121212;
        color: #d4d4d4;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      h3 {
        margin: 15px;
        color: #007acc;
        font-weight: normal;
        flex-shrink: 0;
      }

      #logs {
        flex-grow: 1;
        overflow-y: auto;
        border: 1px solid #333;
        margin: 0 15px 10px 15px;
        padding: 10px;
        background: #1e1e1e;
        font-family: "Consolas", "Monaco", monospace;
        font-size: 13px;
        border-radius: 4px;
        border-left: 3px solid #007acc;
        line-height: 1.5;
      }

      .log-success {
        color: #4caf50;
        font-weight: bold;
      }
      .log-error {
        color: #f44336;
      }
      .log-info {
        color: #4fc1ff;
      }
      .log-warn {
        color: #ce9178;
      }
      .log-update {
        color: #ff9800;
        background: rgba(255, 152, 0, 0.1);
        padding: 2px 4px;
        border-radius: 2px;
        display: block;
        margin: 5px 0;
      }

      .setup-panel {
        background: #252526;
        padding: 15px;
        margin: 0 15px 15px 15px;
        border-radius: 8px;
        border-top: 4px solid #007acc;
        display: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        flex-shrink: 0;
      }

      .path-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .path-row input {
        flex: 1;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        background: #3c3c3c;
        border: 1px solid #555;
        color: white;
        border-radius: 4px;
        box-sizing: border-box;
        outline: none;
      }

      input:focus {
        border-color: #007acc;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      button {
        background: #007acc;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 4px;
        font-weight: bold;
        transition: background 0.2s;
      }

      button:hover {
        background: #0062a3;
      }

      .info-text {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 5px;
      }

      .small {
        padding: 8px 12px;
        font-size: 13px;
        background: #444;
      }
    </style>
  </head>

  <body>
    <h3>ItemStorage Manager Log</h3>

    <div id="logs">Инициализация...</div>

    <div id="setup-panel" class="setup-panel">
      <h3 style="margin: 0 0 10px 0; font-size: 18px;">Настройка конфигурации</h3>

      <div id="setup-error" style="color: #ff6b6b; margin-bottom: 10px;"></div>

      <div id="path-section">
        <p class="info-text">Укажите путь к папке World of Warcraft:</p>

        <div class="path-row">
          <input type="text" id="game-path" placeholder="C:\Games\World of Warcraft" />

          <button class="small" onclick="chooseFolder()">
            Выбрать
          </button>
        </div>
      </div>

      <div id="token-section" style="display: none;">
        <p class="info-text">
          Введите GitHub Token (для режима администратора):
        </p>

        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxx" />

        <div style="margin-top: 8px;">
          <button onclick="useUserMode()" style="background: #555;">
            Использовать пользовательский режим
          </button>
        </div>
      </div>

      <div class="actions">
        <button onclick="saveSettings()">Сохранить</button>
      </div>
    </div>

    <script>
      const { listen } = window.__TAURI__.event;
      const { invoke } = window.__TAURI__.core;

      const logsDiv = document.getElementById("logs");
      const setupPanel = document.getElementById("setup-panel");
      const tokenSection = document.getElementById("token-section");
      const pathSection = document.getElementById("path-section");

      listen("log-event", (event) => {
        const msg = event.payload;
        if (!msg) return;

        const line = document.createElement("div");
        line.textContent = msg;

        if (msg.includes("[SUCCESS]") || msg.includes("[OK]")) {
          line.className = "log-success";
        } else if (msg.includes("[ERROR]") || msg.includes("[WARN]") || msg.includes("[!]")) {
          line.className = "log-error";
        } else if (msg.includes("[INFO]") || msg.includes("[SYNC]")) {
          line.className = "log-info";
        } else if (msg.includes("[UPDATE]")) {
          line.className = "log-update";
        }

        logsDiv.appendChild(line);
        logsDiv.scrollTop = logsDiv.scrollHeight;

        if (msg.includes("[NEED_SETUP]")) {
          setupPanel.style.display = "block";
          pathSection.style.display = "block";
          tokenSection.style.display = "none";
        }

        if (msg.includes("[NEED_SETUP_TOKEN]")) {
          setupPanel.style.display = "block";
          tokenSection.style.display = "block";
          pathSection.style.display = "none";
        }
      });

      // Функция для открытия диалога теперь берется из плагина корректно
      async function chooseFolder() {
        try {
          // В Tauri 2.0 команда требует обертки в ключ "options"
          const selected = await window.__TAURI__.core.invoke("plugin:dialog|open", {
            options: {
              title: "Выберите папку World of Warcraft",
              directory: true,
              multiple: false,
            },
          });

          if (selected) {
            // selected вернет строку с путем или null, если выбор отменен
            document.getElementById("game-path").value = selected;
          }
        } catch (e) {
          console.error("Ошибка при выборе папки:", e);
          alert("Не удалось открыть диалог: " + e);
        }
      }

      async function saveSettings() {
        const path = document.getElementById("game-path").value;
        const token = document.getElementById("gh-token").value;

        try {
          await invoke("update_settings", {
            path,
            token,
            userMode: false,
          });

          setupPanel.style.display = "none";
          document.getElementById("setup-error").textContent = "";
        } catch (e) {
          showError(e);
        }
      }

      async function useUserMode() {
        const path = document.getElementById("game-path").value;

        try {
          await invoke("update_settings", {
            path,
            token: "",
            userMode: true,
          });

          setupPanel.style.display = "none";
          document.getElementById("setup-error").textContent = "";
        } catch (e) {
          showError(e);
        }
      }

      function showError(e) {
        const errorBox = document.getElementById("setup-error");

        if (e === "INVALID_PATH") {
          errorBox.textContent = "❌ Неверный путь к папке WoW";
          return;
        }

        if (e === "INVALID_TOKEN") {
          errorBox.textContent = "❌ GitHub Token недействителен";
          tokenSection.style.display = "block";
          pathSection.style.display = "none";
          return;
        }

        errorBox.textContent = "Ошибка: " + e;
      }
    </script>
  </body>
</html>
